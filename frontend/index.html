<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FireReach - Autonomous Outreach Engine</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #1a1a2e;
            color: #e8e8e8;
            padding: 20px;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        h1 {
            font-size: 48px;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: #b8b8b8;
            font-size: 18px;
        }
        
        .tabs {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
            justify-content: center;
        }
        
        .tab {
            background: #0f3460;
            border: none;
            color: #e8e8e8;
            padding: 12px 32px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .tab:hover {
            background: #16213e;
        }
        
        .tab.active {
            background: #ff6b35;
            color: white;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        
        .card {
            background: #0f3460;
            border-radius: 12px;
            padding: 24px;
        }
        
        .card h2 {
            margin-bottom: 20px;
            color: #ff6b35;
            font-size: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #b8b8b8;
            font-size: 14px;
        }
        
        input, textarea {
            width: 100%;
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 8px;
            padding: 12px;
            color: #e8e8e8;
            font-size: 14px;
            margin-bottom: 16px;
            font-family: inherit;
        }
        
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        button {
            background: #ff6b35;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
            width: 100%;
        }
        
        button:hover {
            background: #ff8555;
        }
        
        button:disabled {
            background: #555;
            cursor: not-allowed;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #b8b8b8;
        }
        
        .spinner {
            border: 3px solid #0f3460;
            border-top: 3px solid #ff6b35;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .pipeline {
            margin-top: 24px;
        }
        
        .pipeline-step {
            background: #16213e;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 2px solid transparent;
        }
        
        .pipeline-step.active {
            border-color: #ff6b35;
            background: rgba(255, 107, 53, 0.1);
            animation: pulse 2s infinite;
        }
        
        .pipeline-step.complete {
            border-color: #00d9ff;
            background: rgba(0, 217, 255, 0.1);
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .step-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #0f3460;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        
        .pipeline-step.complete .step-icon {
            background: #00d9ff;
        }
        
        .results {
            display: none;
        }
        
        .results.show {
            display: block;
        }
        
        .section {
            margin-bottom: 32px;
        }
        
        .section h3 {
            color: #ff6b35;
            margin-bottom: 16px;
            font-size: 18px;
        }
        
        .contact-card {
            background: #16213e;
            border-radius: 8px;
            padding: 16px;
        }
        
        .contact-row {
            margin-bottom: 8px;
            display: flex;
            gap: 8px;
        }
        
        .contact-label {
            color: #b8b8b8;
            min-width: 80px;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .badge.apollo {
            background: #4a90e2;
            color: white;
        }
        
        .badge.hunter {
            background: #27ae60;
            color: white;
        }
        
        .badge.user_provided {
            background: #555;
            color: white;
        }
        
        .badge.not_found {
            background: #ffa502;
            color: white;
        }
        
        .badge.high {
            background: #27ae60;
            color: white;
        }
        
        .badge.medium {
            background: #ffa502;
            color: white;
        }
        
        .badge.sent {
            background: #27ae60;
            color: white;
        }
        
        .badge.failed {
            background: #ff4757;
            color: white;
        }
        
        .badge.no_email_found {
            background: #ffa502;
            color: white;
        }
        
        .badge.cache {
            background: #555;
            color: #e8e8e8;
        }
        
        .signal-card {
            background: #16213e;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
        }
        
        .signal-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 8px;
        }
        
        .signal-text {
            flex: 1;
            margin-right: 12px;
        }
        
        .signal-meta {
            font-size: 12px;
            color: #888;
        }
        
        .brief-text {
            background: #16213e;
            border-radius: 8px;
            padding: 20px;
            line-height: 1.8;
            color: #d0d0d0;
            white-space: pre-wrap;
        }
        
        .email-preview {
            background: #16213e;
            border-radius: 8px;
            padding: 20px;
        }
        
        .email-subject {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .email-to {
            color: #888;
            font-size: 14px;
            margin-bottom: 16px;
        }
        
        .email-body {
            line-height: 1.8;
            white-space: pre-wrap;
        }
        
        .status-container {
            text-align: center;
            padding: 24px;
        }
        
        .status-badge {
            display: inline-block;
            padding: 12px 24px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        
        .status-message {
            color: #b8b8b8;
            font-size: 14px;
        }
        
        .warning {
            background: rgba(255, 165, 2, 0.1);
            border: 1px solid #ffa502;
            border-radius: 8px;
            padding: 12px;
            color: #ffa502;
            margin-bottom: 16px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            background: #16213e;
            padding: 12px;
            text-align: left;
            color: #ff6b35;
            font-weight: 600;
        }
        
        td {
            padding: 12px;
            border-bottom: 1px solid #16213e;
        }
        
        tr {
            background: #0f3460;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        tr:nth-child(even) {
            background: #16213e;
        }
        
        tr:hover {
            background: rgba(255, 107, 53, 0.1);
        }
        
        .detail-panel {
            background: #1a1a2e;
            padding: 24px;
            border-radius: 8px;
            margin-top: 12px;
        }
        
        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-top: 16px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #b8b8b8;
        }
        
        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
        
        .refresh-btn {
            background: #0f3460;
            color: #e8e8e8;
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            float: right;
            margin-bottom: 16px;
            width: auto;
        }
        
        .refresh-btn:hover {
            background: #16213e;
        }
        
        .close-btn {
            background: #ff4757;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            margin-top: 16px;
            width: auto;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔥 FireReach</h1>
            <p class="subtitle">Autonomous Outreach Engine</p>
        </header>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('outreach')">🚀 New Outreach</button>
            <button class="tab" onclick="switchTab('history')">📋 History</button>
        </div>
        
        <!-- TAB 1: NEW OUTREACH -->
        <div id="outreach-tab" class="tab-content active">
            <div class="grid">
                <!-- Left Column -->
                <div>
                    <div class="card" id="input-card">
                        <h2>Launch Campaign</h2>
                        <form id="outreach-form">
                            <label>Ideal Customer Profile</label>
                            <textarea id="icp" placeholder="e.g., We sell cybersecurity training to Series B startups" required></textarea>
                            
                            <label>Company Name</label>
                            <input type="text" id="company" placeholder="e.g., Stripe" required>
                            
                            <label>Recipient Email (fallback if contact not found)</label>
                            <input type="email" id="email" placeholder="e.g., cto@company.com" required>
                            
                            <button type="submit">🚀 Launch FireReach</button>
                        </form>
                    </div>
                    
                    <div class="card pipeline" id="pipeline-card" style="display: none;">
                        <h2>🤖 Agent Pipeline</h2>
                        <div class="loading" id="loading-text">
                            <div class="spinner"></div>
                            <p>Running autonomous agent pipeline...</p>
                        </div>
                        <div id="pipeline-steps">
                            <div class="pipeline-step" id="step-1">
                                <div class="step-icon">1</div>
                                <div>🔍 Signal Harvesting</div>
                            </div>
                            <div class="pipeline-step" id="step-2">
                                <div class="step-icon">2</div>
                                <div>✅ Signal Verification</div>
                            </div>
                            <div class="pipeline-step" id="step-3">
                                <div class="step-icon">3</div>
                                <div>📝 Account Research</div>
                            </div>
                            <div class="pipeline-step" id="step-4">
                                <div class="step-icon">4</div>
                                <div>✉️ Email Dispatch</div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Right Column -->
                <div class="results" id="results-card">
                    <!-- Contact Section -->
                    <div class="section">
                        <h3>👤 Contact Discovered</h3>
                        <div class="contact-card" id="contact-info"></div>
                    </div>
                    
                    <!-- Signals Section -->
                    <div class="section">
                        <div class="section-header">
                            <h3>⚡ Signals Captured</h3>
                            <span id="cache-badge"></span>
                        </div>
                        <div id="signals-list"></div>
                    </div>
                    
                    <!-- Account Brief Section -->
                    <div class="section">
                        <h3>📊 Account Brief</h3>
                        <div class="brief-text" id="account-brief"></div>
                    </div>
                    
                    <!-- Email Section -->
                    <div class="section">
                        <h3>✉️ Generated Email</h3>
                        <div class="email-preview">
                            <div class="email-subject" id="email-subject"></div>
                            <div class="email-to" id="email-to"></div>
                            <div class="email-body" id="email-body"></div>
                        </div>
                    </div>
                    
                    <!-- Status Section -->
                    <div class="section">
                        <h3>📤 Email Status</h3>
                        <div class="status-container" id="status-container"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- TAB 2: HISTORY -->
        <div id="history-tab" class="tab-content">
            <button class="refresh-btn" onclick="loadHistory()">🔄 Refresh</button>
            <div style="clear: both;"></div>
            <div id="history-content"></div>
        </div>
    </div>
    
    <script>
        // API Configuration
        const API_URL = 'https://firereach-m46a.onrender.com';
        
        let currentTab = 'outreach';
        let expandedRow = null;
        
        function switchTab(tab) {
            currentTab = tab;
            
            // Update tab buttons
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            // Update tab content
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(tab + '-tab').classList.add('active');
            
            // Load history if switching to history tab
            if (tab === 'history') {
                loadHistory();
            }
        }
        
        // Form submission
        document.getElementById('outreach-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const icp = document.getElementById('icp').value;
            const company = document.getElementById('company').value;
            const email = document.getElementById('email').value;
            
            // Hide form, show pipeline
            document.getElementById('input-card').style.display = 'none';
            document.getElementById('pipeline-card').style.display = 'block';
            document.getElementById('results-card').classList.remove('show');
            
            // Animate pipeline steps
            animatePipeline();
            
            try {
                const response = await fetch(`${API_URL}/run-agent`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ icp, company, recipient_email: email })
                });
                
                const data = await response.json();
                
                // Stop animation, mark all complete
                stopPipelineAnimation();
                
                // Display results
                displayResults(data);
                
            } catch (error) {
                alert('Error: ' + error.message);
                document.getElementById('input-card').style.display = 'block';
                document.getElementById('pipeline-card').style.display = 'none';
            }
        });
        
        let pipelineInterval;
        let currentStep = 1;
        
        function animatePipeline() {
            currentStep = 1;
            document.getElementById('step-1').classList.add('active');
            
            pipelineInterval = setInterval(() => {
                if (currentStep < 4) {
                    document.getElementById(`step-${currentStep}`).classList.remove('active');
                    document.getElementById(`step-${currentStep}`).classList.add('complete');
                    document.getElementById(`step-${currentStep}`).querySelector('.step-icon').textContent = '✓';
                    
                    currentStep++;
                    document.getElementById(`step-${currentStep}`).classList.add('active');
                }
            }, 2000);
        }
        
        function stopPipelineAnimation() {
            clearInterval(pipelineInterval);
            
            for (let i = 1; i <= 4; i++) {
                document.getElementById(`step-${i}`).classList.remove('active');
                document.getElementById(`step-${i}`).classList.add('complete');
                document.getElementById(`step-${i}`).querySelector('.step-icon').textContent = '✓';
            }
            
            document.getElementById('loading-text').style.display = 'none';
        }
        
        function displayResults(data) {
            // Contact
            const contact = data.contact_discovered;
            let contactHTML = '';
            
            if (contact.source === 'not_found') {
                contactHTML = '<div class="warning">⚠️ Contact not found — email used as fallback</div>';
            }
            
            contactHTML += `
                <div class="contact-row">
                    <span class="contact-label">Name:</span>
                    <span>${contact.name || 'Not found'}</span>
                </div>
                <div class="contact-row">
                    <span class="contact-label">Title:</span>
                    <span>${contact.title || 'Not found'}</span>
                </div>
                <div class="contact-row">
                    <span class="contact-label">Email:</span>
                    <span>${contact.email || 'Not found'}</span>
                </div>
                ${contact.linkedin_url ? `
                <div class="contact-row">
                    <span class="contact-label">LinkedIn:</span>
                    <span><a href="${contact.linkedin_url}" target="_blank" style="color: #00d9ff;">${contact.linkedin_url}</a></span>
                </div>
                ` : ''}
                <div class="contact-row">
                    <span class="contact-label">Source:</span>
                    <span class="badge ${contact.source}">${contact.source.toUpperCase().replace('_', ' ')}</span>
                </div>
            `;
            document.getElementById('contact-info').innerHTML = contactHTML;
            
            // Cache badge
            if (data.cache_hit) {
                document.getElementById('cache-badge').innerHTML = '<span class="badge cache">⚡ From cache</span>';
            }
            
            // Signals
            const signalsHTML = data.signals.map(s => `
                <div class="signal-card">
                    <div class="signal-header">
                        <div class="signal-text">${s.signal}</div>
                        <span class="badge ${s.confidence.toLowerCase()}">${s.confidence}</span>
                    </div>
                    <div class="signal-meta">Verified by: ${s.verified_by}</div>
                </div>
            `).join('');
            document.getElementById('signals-list').innerHTML = signalsHTML;
            
            // Account brief
            document.getElementById('account-brief').textContent = data.account_brief;
            
            // Email
            document.getElementById('email-subject').textContent = data.subject;
            document.getElementById('email-to').textContent = `To: ${data.recipient}`;
            document.getElementById('email-body').textContent = data.generated_email;
            
            // Status
            let statusHTML = `<div class="status-badge badge ${data.status}">${data.status.toUpperCase().replace('_', ' ')}</div>`;
            
            if (data.status === 'sent') {
                statusHTML += `<div class="status-message">✅ Email delivered to ${data.recipient}</div>`;
            } else if (data.status === 'failed') {
                statusHTML += `<div class="status-message">❌ Check your Resend API key and FROM_EMAIL</div>`;
            } else if (data.status === 'no_email_found') {
                statusHTML += `<div class="status-message">⚠️ Apollo and Hunter returned no email. Add recipient manually.</div>`;
            }
            
            document.getElementById('status-container').innerHTML = statusHTML;
            
            // Show results
            document.getElementById('results-card').classList.add('show');
        }
        
        // History functions
        async function loadHistory() {
            try {
                const response = await fetch(`${API_URL}/history`);
                const data = await response.json();
                
                if (data.runs.length === 0) {
                    document.getElementById('history-content').innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📭</div>
                            <p>No outreach runs yet. Launch your first campaign.</p>
                        </div>
                    `;
                    return;
                }
                
                let tableHTML = `
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Date</th>
                                <th>Company</th>
                                <th>Contact</th>
                                <th>Title</th>
                                <th>Source</th>
                                <th>Signals</th>
                                <th>Status</th>
                                <th>Subject</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                
                data.runs.forEach(run => {
                    tableHTML += `
                        <tr onclick="toggleDetail(${run.id})">
                            <td>${run.id}</td>
                            <td>${new Date(run.created_at).toLocaleDateString()}</td>
                            <td>${run.company}</td>
                            <td>${run.contact_name || 'N/A'}</td>
                            <td>${run.contact_title || 'N/A'}</td>
                            <td><span class="badge ${run.contact_source}">${run.contact_source.toUpperCase().replace('_', ' ')}</span></td>
                            <td><span style="color: #27ae60;">${run.high_confidence_count} verified</span></td>
                            <td><span class="badge ${run.send_status}">${run.send_status.toUpperCase().replace('_', ' ')}</span></td>
                            <td>${run.email_subject}</td>
                        </tr>
                        <tr id="detail-${run.id}" style="display: none;">
                            <td colspan="9">
                                <div class="detail-panel" id="detail-content-${run.id}"></div>
                            </td>
                        </tr>
                    `;
                });
                
                tableHTML += '</tbody></table>';
                document.getElementById('history-content').innerHTML = tableHTML;
                
            } catch (error) {
                alert('Error loading history: ' + error.message);
            }
        }
        
        async function toggleDetail(runId) {
            const detailRow = document.getElementById(`detail-${runId}`);
            
            if (expandedRow === runId) {
                detailRow.style.display = 'none';
                expandedRow = null;
                return;
            }
            
            // Close previous
            if (expandedRow) {
                document.getElementById(`detail-${expandedRow}`).style.display = 'none';
            }
            
            // Load detail
            try {
                const response = await fetch(`${API_URL}/history/${runId}`);
                const run = await response.json();
                
                const signalsHTML = run.signals.map(s => `
                    <div class="signal-card">
                        <div class="signal-header">
                            <div class="signal-text">${s.signal}</div>
                            <span class="badge ${s.confidence.toLowerCase()}">${s.confidence}</span>
                        </div>
                    </div>
                `).join('');
                
                document.getElementById(`detail-content-${runId}`).innerHTML = `
                    <h3 style="color: #ff6b35; margin-bottom: 16px;">Run Details</h3>
                    <div class="detail-grid">
                        <div>
                            <h4 style="color: #00d9ff; margin-bottom: 12px;">Account Brief</h4>
                            <div class="brief-text">${run.account_brief}</div>
                        </div>
                        <div>
                            <h4 style="color: #00d9ff; margin-bottom: 12px;">Generated Email</h4>
                            <div class="email-preview">
                                <div class="email-subject">${run.email_subject}</div>
                                <div class="email-body">${run.generated_email}</div>
                            </div>
                        </div>
                    </div>
                    <div style="margin-top: 24px;">
                        <h4 style="color: #00d9ff; margin-bottom: 12px;">All Signals</h4>
                        ${signalsHTML}
                    </div>
                    <button class="close-btn" onclick="toggleDetail(${runId})">Close</button>
                `;
                
                detailRow.style.display = 'table-row';
                expandedRow = runId;
                
            } catch (error) {
                alert('Error loading detail: ' + error.message);
            }
        }
    </script>
</body>
</html>
